[profile.default]
src = "src"
test = "test"
out = "out"
cache_path = "cache"
solc_version = "0.8.24"
auto_detect_solc = false
optimizer = true
optimizer_runs = 200
fuzz = { runs = 256 }
invariant = { runs = 128, depth = 32, fail_on_revert = false }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
